<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toko Jual Beli</title>
    <style>
        /* Gaya dasar untuk mempercantik tampilan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background-color: #27ae60; /* Warna hijau khas marketplace */
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:hover {
            background-color: #219150;
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9em;
        }

        .footer-links a {
            color: #27ae60;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Masuk ke Akun</h2>
        <form action="/proses-login" method="POST">
            <div class="form-group">
                <label for="email">Email atau Nomor HP</label>
                <input type="text" id="email" name="email" placeholder="Masukkan email anda" required>
            </div>
            
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
            </div>

            <button type="submit" class="btn-login">Masuk Sekarang</button>
        </form>

        <div class="footer-links">
            <p>Belum punya akun? <a href="#">Daftar di sini</a></p>
            <p><a href="#">Lupa kata sandi?</a></p>
        </div>
    </div>

</body>
</html>
